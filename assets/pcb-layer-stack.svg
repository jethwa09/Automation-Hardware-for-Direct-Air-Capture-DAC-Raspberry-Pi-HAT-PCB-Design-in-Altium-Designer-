<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480" role="img" aria-labelledby="title desc">
  <title id="title">Conceptual two-layer PCB stack</title>
  <desc id="desc">A conceptual stack showing top silkscreen, top solder mask, top copper, FR-4 dielectric, bottom copper, bottom solder mask, and bottom silkscreen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#10253a"/></linearGradient>
    <style>.h{font:700 36px Inter,Segoe UI,Arial,sans-serif;fill:#f8fafc}.s{font:500 18px Inter,Segoe UI,Arial,sans-serif;fill:#a5b4c7}.l{font:700 18px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.d{font:500 16px Inter,Segoe UI,Arial,sans-serif;fill:#cbd5e1}</style>
  </defs>
  <rect width="1400" height="480" fill="url(#bg)"/>
  <text x="70" y="62" class="h">Conceptual PCB Layer Stack</text>
  <text x="70" y="96" class="s">Two copper layers are confirmed by the supplied CAM exports; thickness and copper weight are not specified.</text>
  <g transform="translate(145 145)">
    <rect x="0" y="0" width="1110" height="34" rx="10" fill="#f8fafc"/><text x="555" y="23" text-anchor="middle" class="l">Top silkscreen / component legend</text>
    <rect x="20" y="42" width="1070" height="38" rx="10" fill="#16a34a"/><text x="555" y="67" text-anchor="middle" class="l">Top solder mask</text>
    <rect x="35" y="88" width="1040" height="30" rx="8" fill="#d4a72c"/><text x="555" y="109" text-anchor="middle" class="l">Top copper — routed signals and pads</text>
    <rect x="55" y="126" width="1000" height="96" rx="14" fill="#d7b98e"/><text x="555" y="181" text-anchor="middle" class="l">FR-4 dielectric core</text>
    <rect x="35" y="230" width="1040" height="30" rx="8" fill="#d4a72c"/><text x="555" y="251" text-anchor="middle" class="l">Bottom copper — routed signals and pads</text>
    <rect x="20" y="268" width="1070" height="38" rx="10" fill="#16a34a"/><text x="555" y="293" text-anchor="middle" class="l">Bottom solder mask</text>
    <rect x="0" y="314" width="1110" height="34" rx="10" fill="#f8fafc"/><text x="555" y="337" text-anchor="middle" class="l">Bottom silkscreen / board marking</text>
  </g>
  <text x="700" y="455" text-anchor="middle" class="d">Not to scale · confirm fabrication stack-up with the PCB manufacturer</text>
</svg>
