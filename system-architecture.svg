<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">System architecture for a Raspberry Pi HAT used in Direct Air Capture automation</title>
  <desc id="desc">A Raspberry Pi drives a custom HAT through the 40-pin GPIO header. The HAT contains a transistor driver, resistors, diodes or indicators, a relay, and field connectors that interface with external DAC process equipment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0c1f31"/></linearGradient>
    <linearGradient id="pi" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b91c1c"/><stop offset="1" stop-color="#7f1d1d"/></linearGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#14532d"/><stop offset="1" stop-color="#064e3b"/></linearGradient>
    <linearGradient id="process" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#075985"/><stop offset="1" stop-color="#0c4a6e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".28"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#67e8f9"/></marker>
    <style>
      .title{font:700 42px Inter,Segoe UI,Arial,sans-serif;fill:#f8fafc}.subtitle{font:400 20px Inter,Segoe UI,Arial,sans-serif;fill:#a5b4c7}.box-title{font:700 27px Inter,Segoe UI,Arial,sans-serif;fill:#fff}.body{font:500 19px Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}.small{font:500 16px Inter,Segoe UI,Arial,sans-serif;fill:#cbd5e1}.chip{fill:#0f172a;stroke:#6ee7b7;stroke-width:2}.chip-title{font:700 20px Inter,Segoe UI,Arial,sans-serif;fill:#d1fae5}.chip-body{font:500 15px Inter,Segoe UI,Arial,sans-serif;fill:#a7f3d0}.line{fill:none;stroke:#67e8f9;stroke-width:5;marker-end:url(#arrow)}.thin{fill:none;stroke:#93c5fd;stroke-width:3;stroke-dasharray:9 8}.tag{font:700 14px Inter,Segoe UI,Arial,sans-serif;fill:#07111f;letter-spacing:.7px}.note{font:500 16px Inter,Segoe UI,Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1480" cy="85" r="170" fill="#14b8a6" opacity=".07"/><circle cx="90" cy="810" r="240" fill="#38bdf8" opacity=".06"/>
  <text x="80" y="82" class="title">Raspberry Pi HAT for Direct Air Capture Automation</text>
  <text x="80" y="119" class="subtitle">Functional architecture reconstructed from the supplied Altium manufacturing outputs</text>

  <g>
    <rect x="70" y="235" width="330" height="400" rx="32" fill="url(#pi)" stroke="#fca5a5" stroke-width="2"/>
    <text x="105" y="290" class="box-title">Raspberry Pi Host</text>
    <text x="105" y="330" class="body">Supervisory control</text>
    <text x="105" y="362" class="body">Data logging</text>
    <text x="105" y="394" class="body">Process sequencing</text>
    <rect x="105" y="455" width="260" height="105" rx="18" fill="#450a0a" stroke="#fecaca" stroke-width="2"/>
    <text x="235" y="495" text-anchor="middle" class="box-title" font-size="22">40-pin GPIO</text>
    <text x="235" y="530" text-anchor="middle" class="small">Power + digital control</text>
    <rect x="105" y="585" width="130" height="30" rx="15" fill="#fecaca"/><text x="170" y="606" text-anchor="middle" class="tag">LINUX / PYTHON</text>
  </g>

  <path d="M400 505 C445 505 450 505 490 505" class="line"/>
  <text x="445" y="481" text-anchor="middle" class="small">GPIO</text>

  <g>
    <rect x="490" y="175" width="650" height="545" rx="36" fill="url(#hat)" stroke="#6ee7b7" stroke-width="2.5"/>
    <text x="535" y="230" class="box-title">Custom DAC Automation HAT · PCB V2.0</text>
    <text x="535" y="264" class="small">Two-layer through-hole board designed in Altium Designer</text>

    <rect x="535" y="310" width="250" height="125" rx="18" class="chip"/>
    <text x="560" y="350" class="chip-title">GPIO Interface</text>
    <text x="560" y="382" class="chip-body">40-pin header routing</text>
    <text x="560" y="408" class="chip-body">Control and power distribution</text>

    <rect x="845" y="310" width="245" height="125" rx="18" class="chip"/>
    <text x="870" y="350" class="chip-title">Driver Stage</text>
    <text x="870" y="382" class="chip-body">Q1 transistor</text>
    <text x="870" y="408" class="chip-body">R1–R3 bias/current paths</text>

    <rect x="535" y="500" width="250" height="125" rx="18" class="chip"/>
    <text x="560" y="540" class="chip-title">Protection / Status</text>
    <text x="560" y="572" class="chip-body">D1–D3 footprints</text>
    <text x="560" y="598" class="chip-body">Switching protection / indication</text>

    <rect x="845" y="500" width="245" height="125" rx="18" class="chip"/>
    <text x="870" y="540" class="chip-title">Relay Output</text>
    <text x="870" y="572" class="chip-body">K1 electromechanical relay</text>
    <text x="870" y="598" class="chip-body">Low-voltage load switching</text>

    <path d="M785 372 L845 372" class="line"/>
    <path d="M967 435 L967 500" class="line"/>
    <path d="M785 562 L845 562" class="thin"/>
    <rect x="698" y="670" width="230" height="34" rx="17" fill="#a7f3d0"/><text x="813" y="693" text-anchor="middle" class="tag">P1 · P2 · P3 FIELD I/O</text>
  </g>

  <path d="M1140 447 C1190 447 1195 447 1240 447" class="line"/>
  <text x="1190" y="423" text-anchor="middle" class="small">Switched I/O</text>

  <g>
    <rect x="1240" y="235" width="300" height="400" rx="32" fill="url(#process)" stroke="#7dd3fc" stroke-width="2"/>
    <text x="1275" y="290" class="box-title" font-size="24">DAC Process Hardware</text>
    <text x="1275" y="340" class="body">Air-moving equipment</text>
    <text x="1275" y="378" class="body">Pump or solenoid valve</text>
    <text x="1275" y="416" class="body">Contactor / auxiliary load</text>
    <text x="1275" y="454" class="body">Process indicators</text>
    <rect x="1275" y="510" width="230" height="88" rx="18" fill="#082f49" stroke="#bae6fd" stroke-width="2"/>
    <text x="1390" y="548" text-anchor="middle" class="box-title" font-size="20">CO₂ Capture Cycle</text>
    <text x="1390" y="578" text-anchor="middle" class="small">Actuate · observe · log</text>
  </g>

  <rect x="80" y="785" width="1440" height="72" rx="18" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="110" y="816" class="note">Engineering note:</text>
  <text x="267" y="816" class="note">The block-level function is inferred from visible designators and routing.</text>
  <text x="110" y="842" class="note">Verify connector pinout, voltage/current ratings, and load assignment against the original Altium schematic before assembly or wiring.</text>
</svg>
